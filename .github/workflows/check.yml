name: Paradigma Quality Gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt
      - name: Rebuild derived machine index
        run: python .paradigma/tools/pd-index.py rebuild
      - name: Verify tracked navigation indexes are current
        run: git diff --exit-code -- memory-bank/knowledge docs/rfc
      - name: Run characterization tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
      - name: Run Paradigma checks
        run: python .paradigma/tools/pd-check-all.py
